<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon Gabon Demain — Startup</title>

<style>
:root{
  --vert:#0B4F2E;
  --jaune:#FEDD00;
  --blanc:#fff;
}

html{scroll-behavior:smooth}
body{margin:0;font-family:Arial;background:#f5f5f5}

header{background:var(--vert);padding:15px;position:sticky;top:0}
nav a{color:white;margin-right:15px;text-decoration:none}

section{padding:60px 20px}
.hero{background:var(--vert);color:white;text-align:center}

.btn{background:var(--jaune);padding:10px 20px;border:none;cursor:pointer}

.container{max-width:1000px;margin:auto}
.card{background:white;padding:20px;margin:10px 0;border-radius:8px}

input,textarea{width:100%;padding:10px;margin:5px 0}

.hidden{display:none}

</style>
</head>

<body>

<header>
<nav>
<a href="#">Accueil</a>
<a href="#idees">Idées</a>
<a href="#ajouter">Proposer</a>
<a href="#login">Connexion</a>
</nav>
</header>

<section class="hero">
<h1>Mon Gabon Demain</h1>
<p>Plateforme citoyenne moderne</p>
</section>

<section id="login" class="container">
<h2>Connexion</h2>
<input type="text" id="username" placeholder="Nom">
<button class="btn" onclick="login()">Se connecter</button>
<p id="userDisplay"></p>
</section>

<section id="ajouter" class="container">
<h2>Proposer une idée</h2>
<input type="text" id="titre" placeholder="Titre">
<textarea id="description" placeholder="Description"></textarea>
<button class="btn" onclick="addIdea()">Publier</button>
</section>

<section id="idees" class="container">
<h2>Idées</h2>
<div id="ideasList"></div>
</section>

<script>
let user = localStorage.getItem('user') || null;
let ideas = JSON.parse(localStorage.getItem('ideas')) || [];

function login(){
  const name = document.getElementById('username').value;
  if(!name) return alert('Entre un nom');
  localStorage.setItem('user', name);
  location.reload();
}

function displayUser(){
  if(user){
    document.getElementById('userDisplay').innerText = "Connecté en tant que " + user;
  }
}

function addIdea(){
  if(!user) return alert('Connecte-toi');

  const titre = document.getElementById('titre').value;
  const desc = document.getElementById('description').value;

  if(!titre || !desc) return alert('Remplis tout');

  ideas.push({titre, desc, votes:0});
  localStorage.setItem('ideas', JSON.stringify(ideas));
  location.reload();
}

function vote(index){
  ideas[index].votes++;
  localStorage.setItem('ideas', JSON.stringify(ideas));
  renderIdeas();
}

function renderIdeas(){
  const container = document.getElementById('ideasList');
  container.innerHTML = '';

  ideas.forEach((idea,i)=>{
    container.innerHTML += `
      <div class="card">
        <h3>${idea.titre}</h3>
        <p>${idea.desc}</p>
        <button onclick="vote(${i})">👍 ${idea.votes}</button>
      </div>
    `;
  });
}

// INIT
renderIdeas();
displayUser();
</script>

</body>
</html>
